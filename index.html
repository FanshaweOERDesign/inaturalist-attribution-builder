<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>iNaturalist Image Attribution Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--[if lt IE 9]>
            <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
        <![endif]-->
    <link rel="shortcut icon" href="images/oer_logo.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container fs-bounce-fade-in">
        <div class="row justify-content-center">
            <div class="col-xxl-8 col-xl-10" id="wrap">
                <div class="row align-items-center">
                    <div class="col-12 col-lg-4 border-end border-light">
                        <h1>iNaturalist<span>Image Attribution Builder</span></h1>
                    </div>
                    <div class="col-12 col-lg-8">
                        <form id="observationForm" style="display: inline;">
                            <label class="fw-bold" for="observationId">Observation ID:</label>
                            <input class="p-2 border-light" type="text" id="observationId" name="observationId" required placeholder="Paste Link/ID 123456789" maxlength="100" oninput="stripNonNumeric(this)">
                            <button class="fw-bold border-light" type="submit">Generate Attribution</button>
                        </form>
                    </div>
                    <div class="col-12 d-none" id="status" style="margin-top:1em;color:#fff;"></div>
                    
                    <div class="col-12 mt-3 d-none" id="outputDiv">
                        <textarea disabled class="form-control" id="output" rows="" ></textarea>
                        <button class="border-light mt-2" id="copyButton">Copy to Clipboard</button>
                        <button class="border-light mt-2" id="downloadButton">Download Image(s)</button>
                    </div>
                    
                    <div id="alertBox" class="col-12 alert alert-success d-none" role="alert"></div>
                </div>
            </div>
        </div> 
    </div>
    <footer class="row justify-content-center align-items-center mt-3">
        <div class="col-lg-1 mb-1" id="logo-div">
                <img id="logo" src="images/oer_logo.png" />
            </div>
        <div class="col-lg-6 col-8"><a class="" href="https://www.inaturalist.org/" target="_blank">iNaturalist</a> - Image Attribution Builder by Marcellous Henry and the Fanshawe OER Design Studio is
            open source software made available under the <a href="https://choosealicense.com/licenses/mit/">MIT
                License</a>.</div>
    </footer>
    <script src="js/script.js"></script>
    <script src="js/analytics.js"></script>
</body>

</html>
